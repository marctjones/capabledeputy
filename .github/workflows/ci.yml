name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # macOS Apple Silicon — CapableDeputy is a macOS-native product (mlx/MFLUX
    # on Apple Silicon, Apple automation, the CapDepMac Swift app). Running CI on
    # arm64 macOS exercises the real target platform: mlx/mflux install, the
    # Apple-only code paths run, and coverage matches the macOS-calibrated
    # ratchet baseline. (Was ubuntu-latest, where those paths skipped — #354.)
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run ruff check

      - name: Format check (ruff)
        run: uv run ruff format --check

      # Blocking gate. The former ~2129 errors were 98% a config bug (pyright had
      # no venvPath so every import read as missing); with that fixed and the
      # residual real type errors cleaned up, pyright is green (#353).
      - name: Type check (pyright)
        run: uv run pyright

      - name: Test (pytest)
        run: uv run pytest --cov-report=xml

      # Blocking gate. Baseline (coverage-ratchet.json) regenerated to match the
      # macOS CI coverage profile (#354); floors ratchet up via
      # `scripts/coverage_ratchet.py --update` when coverage legitimately rises.
      - name: Coverage ratchet
        run: uv run python scripts/coverage_ratchet.py

      - name: Upload coverage
        if: matrix.python-version == '3.14'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
