name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run ruff check

      - name: Format check (ruff)
        run: uv run ruff format --check

      # Advisory until the pre-existing type debt is cleared (#353). pyright
      # reports ~2129 errors in `standard` mode across the codebase — it has
      # never been green (CI could not previously run this far). Kept in CI as
      # an informational signal, but it does not block PRs until a dedicated
      # type-annotation cleanup lands, at which point drop `continue-on-error`.
      - name: Type check (pyright)
        continue-on-error: true
        run: uv run pyright

      - name: Test (pytest)
        run: uv run pytest --cov-report=xml

      # Advisory: the ratchet baseline (coverage-ratchet.json) is calibrated on
      # macOS, where the Apple-only mlx/image/desktop code paths ARE exercised.
      # On Linux CI those tests skip, so coverage groups go missing / drop below
      # floor and the ratchet fails even though nothing regressed. Until CI runs
      # on macOS (or a Linux baseline is maintained), keep this informational.
      # See #354.
      - name: Coverage ratchet
        continue-on-error: true
        run: uv run python scripts/coverage_ratchet.py

      - name: Upload coverage
        if: matrix.python-version == '3.14'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
