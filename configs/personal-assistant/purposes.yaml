# Five working purposes for daily personal-assistant use.
# Each purpose carries its own bindings + default_capabilities so a
# session spawned with that purpose is born with the right caps.

purposes:
  - purpose_id: general
    label: "General assistance (default)"
    # The broadest set; lets the agent read most local content, search
    # the web, take notes, browse code repos.
    admissible_categories:
      - personal
      - work
      - public
      - scratch
      - code
      - email
    default_capabilities:
      - kind: READ_FS
        pattern: "/Users/*/Documents/**"
      - kind: READ_FS
        pattern: "/Users/*/notes/**"
      - kind: READ_FS
        pattern: "/Users/*/Documents/GitHub/**"
      - kind: READ_FS
        pattern: "/Users/*/Desktop/**"
      - kind: CREATE_FS
        pattern: "/Users/*/notes/scratch/**"
      - kind: WEB_FETCH
        pattern: "https://*"
      - kind: GMAIL_READ
        pattern: "*"
      - kind: DRIVE_READ
        pattern: "*"
      - kind: CALENDAR_READ
        pattern: "*"
      - kind: PEOPLE_READ
        pattern: "*"
      - kind: APPLE_MAIL_READ
        pattern: "*"
      - kind: KEYNOTE_READ
        pattern: "*"
      - kind: PAGES_READ
        pattern: "*"
      - kind: NUMBERS_READ
        pattern: "*"
      - kind: MACOS_CLIPBOARD_READ
        pattern: "*"
      - kind: MACOS_NOTIFICATION
        pattern: "*"
      - kind: GENERATE_IMAGE
        pattern: "*"
      - kind: FETCH_IMAGE
        pattern: "*"
      - kind: CREATE_FS
        pattern: "/Users/*/.capdep/work/**"
    bindings:
      - scope_pattern_canonical: "file:///Users/*/notes/scratch/**"
        category: scratch
        default_tier: none

  - purpose_id: inbox
    label: "Email triage and summarization"
    admissible_categories: [personal, work, email, public]
    default_capabilities:
      # Issue #33 — granular email/drive kinds replace the blanket
      # `READ_FS *` that conflated filesystem reads with email reads.
      - kind: GMAIL_READ
        pattern: "*"
      - kind: GMAIL_DRAFT
        pattern: "*"
      - kind: IMAP_READ
        pattern: "*"
      - kind: APPLE_MAIL_READ
        pattern: "*"
      - kind: APPLE_MAIL_DRAFT
        pattern: "*"
      - kind: DRIVE_READ
        pattern: "*"
      - kind: CALENDAR_READ
        pattern: "*"
      - kind: PEOPLE_READ
        pattern: "*"
      - kind: CREATE_FS
        pattern: "/Users/*/notes/inbox-summaries/**"
    bindings:
      - scope_pattern_canonical: "gmail://**"
        category: email
        default_tier: sensitive

  - purpose_id: calendar
    label: "Calendar review and scheduling"
    admissible_categories: [personal, work, public]
    default_capabilities:
      - kind: CALENDAR_READ
        pattern: "*"
      - kind: CREATE_CAL
        pattern: "*"
      - kind: MODIFY_CAL
        pattern: "*"
      - kind: PEOPLE_READ
        pattern: "*"
      - kind: READ_FS
        pattern: "/Users/*/notes/**"

  - purpose_id: writing
    label: "Document drafting and editing"
    admissible_categories: [personal, work, public, scratch]
    default_capabilities:
      - kind: READ_FS
        pattern: "/Users/*/Documents/**"
      - kind: READ_FS
        pattern: "/Users/*/notes/**"
      - kind: CREATE_FS
        pattern: "/Users/*/Documents/drafts/**"
      - kind: CREATE_FS
        pattern: "/Users/*/notes/**"
      - kind: MODIFY_FS
        pattern: "/Users/*/Documents/drafts/**"
      - kind: DRIVE_READ
        pattern: "*"
      - kind: PAGES_READ
        pattern: "*"
      - kind: PAGES_EDIT
        pattern: "*"
      - kind: PAGES_EXPORT
        pattern: "*"
      - kind: NUMBERS_READ
        pattern: "*"
      - kind: KEYNOTE_READ
        pattern: "*"
      - kind: WEB_FETCH
        pattern: "https://*"

  - purpose_id: research
    label: "Web research with note-taking"
    admissible_categories: [public, scratch, personal]
    default_capabilities:
      - kind: WEB_FETCH
        pattern: "https://*"
      - kind: READ_FS
        pattern: "/Users/*/notes/**"
      - kind: CREATE_FS
        pattern: "/Users/*/notes/research/**"
      - kind: READ_FS
        pattern: "/Users/*/Documents/**"
      - kind: DRIVE_READ
        pattern: "*"
      - kind: PAGES_READ
        pattern: "*"
      - kind: NUMBERS_READ
        pattern: "*"
