# Auto-approval patterns for recurring safe workflows.
# Each pattern still emits APPROVAL_REQUESTED + APPROVAL_APPROVED
# audit events, so you have the trail; the pattern just removes the
# manual prompt.
#
# TIGHTEN the recipient/vendor globs to your specific addresses
# BEFORE enabling. A bare *@example.com auto-approves email to ANY
# address at that domain — only do that for domains you control.

patterns:
  # Self-addressed drafts. Replace me@example.com with YOUR actual address.
  # Direct SEND_EMAIL is disabled in the default Gmail server config; these
  # patterns cover the practical draft-and-review workflow.
  - name: self-gmail-draft
    action: GMAIL_DRAFT
    target_pattern: "me@example.com"
    ttl_hours: 720  # 30 days
    created_by: "preset:personal-assistant"

  - name: self-apple-mail-draft
    action: APPLE_MAIL_DRAFT
    target_pattern: "me@example.com"
    ttl_hours: 720
    created_by: "preset:personal-assistant"

  # Trusted draft preparation. Replace the placeholder addresses with exact
  # family/work recipients you already trust for draft review. These still do
  # not enable SEND_EMAIL.
  - name: trusted-family-gmail-draft
    action: GMAIL_DRAFT
    target_pattern: "spouse@example.com"
    ttl_hours: 720
    created_by: "preset:personal-assistant"

  - name: trusted-work-gmail-draft
    action: GMAIL_DRAFT
    target_pattern: "coworker@example.com"
    ttl_hours: 720
    created_by: "preset:personal-assistant"

  # Calendar attendee-aware auto-approval needs exact stable attendee/self
  # targets from the upstream tool. Until your calendar tool arguments are
  # verified, leave calendar mutations governed by purpose/relationship-aware
  # Starlark first-use confirmation instead of a broad approval pattern.
