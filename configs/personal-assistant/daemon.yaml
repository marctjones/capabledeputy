# Master daemon config for the personal-assistant preset.
# Wires up the 5 bundled MCP servers + Google Workspace + signals
# the daemon to read the other policy files from this same directory.
#
# Use:
#   capdep daemon start --config configs/personal-assistant/daemon.yaml
#
# The daemon's policy loader walks the parent directory of this file
# looking for: profiles.yaml, purposes.yaml, source_bindings.yaml,
# envelopes.yaml, override_policy.yaml, approval-patterns.yaml. Drop
# them next to this file to be picked up.

upstream_servers:
  # ---------------- bundled Python servers ----------------
  # No Node.js / npm required. Pure Python, ships with capdep.

  - name: bundled-fs
    command: ["capdep", "mcp-server-fs"]
    inherent_labels: []
    tool_overrides:
      "fs.read":
        capability_kind: READ_FS
      "fs.list":
        capability_kind: READ_FS
      "fs.create":
        capability_kind: CREATE_FS
      "fs.write":
        capability_kind: WRITE_FS
      "fs.delete":
        capability_kind: DELETE_FS

  - name: bundled-fetch
    command: ["capdep", "mcp-server-fetch"]
    inherent_labels: ["untrusted.external"]
    tool_overrides:
      "fetch.get":
        capability_kind: WEB_FETCH

  - name: bundled-search
    command: ["capdep", "mcp-server-search"]
    inherent_labels: ["untrusted.external"]
    tool_overrides:
      "search.web":
        capability_kind: WEB_FETCH

  - name: bundled-memory
    command: ["capdep", "mcp-server-memory"]
    inherent_labels: []
    tool_overrides:
      "memory.create":
        capability_kind: CREATE_FS
      "memory.read":
        capability_kind: READ_FS
      "memory.update":
        capability_kind: WRITE_FS
      "memory.delete":
        capability_kind: DELETE_FS
      "memory.list":
        capability_kind: READ_FS

  - name: bundled-git
    command: ["capdep", "mcp-server-git"]
    inherent_labels: []
    tool_overrides:
      "git.status":
        capability_kind: READ_FS
      "git.log":
        capability_kind: READ_FS
      "git.diff":
        capability_kind: READ_FS
      "git.show":
        capability_kind: READ_FS
      "git.branch_list":
        capability_kind: READ_FS

  # ---------------- Google Workspace ----------------
  # Wired to `gws mcp` from `@googleworkspace/cli`. Google handles
  # OAuth via OS keyring (AES-256-GCM at rest); we just spawn + proxy
  # stdio through the policy chokepoint.
  #
  # Operator setup (once):
  #   npm install -g @googleworkspace/cli
  #   gws auth setup
  #   gws auth login -s drive,gmail,calendar,docs,sheets
  #
  # See docs/gworkspace-setup.md for the full walkthrough.
  # Comment this block out if you don't want Google integration.

  - name: gws
    command: ["gws", "mcp", "-s", "drive,gmail,calendar,docs,sheets"]
    inherent_labels:
      - confidential.personal
    tool_overrides:
      # Tools follow Google Discovery API method paths. The adapter's
      # name-based inference covers most cases; pin the highest-risk
      # ones explicitly so nothing destructive depends on inference.
      "gmail.users.messages.send":
        capability_kind: SEND_EMAIL
      "calendar.events.delete":
        capability_kind: DELETE_CAL
        additional_labels: ["confidential.personal"]
      "calendar.events.update":
        capability_kind: MODIFY_CAL
        additional_labels: ["confidential.personal"]
      "drive.files.delete":
        capability_kind: DELETE_FS
        additional_labels: ["confidential.personal"]
      "drive.files.update":
        capability_kind: MODIFY_FS
        additional_labels: ["confidential.personal"]
    strict: false
