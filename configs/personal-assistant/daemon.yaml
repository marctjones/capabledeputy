# Master daemon config for the personal-assistant preset.
# Wires up bundled local MCP servers, macOS app automation, and Google's
# official Workspace remote MCP servers. The daemon also reads the other
# policy files from this same directory.
#
# Use:
#   capdep daemon start --config configs/personal-assistant/daemon.yaml
#
# The daemon's policy loader walks the parent directory of this file
# looking for: profiles.yaml, purposes.yaml, source_bindings.yaml,
# envelopes.yaml, override_policy.yaml, approval-patterns.yaml. Drop
# them next to this file to be picked up.

upstream_servers:
  # ---------------- bundled Python servers ----------------
  # No Node.js / npm required. Pure Python, ships with capdep.

  - name: bundled-fs
    command: ["capdep", "mcp-server-fs"]
    inherent_labels: []
    tool_overrides:
      "fs.read":
        capability_kind: READ_FS
      "fs.list":
        capability_kind: READ_FS
      "fs.create":
        capability_kind: CREATE_FS
      "fs.write":
        capability_kind: WRITE_FS
      "fs.delete":
        capability_kind: DELETE_FS

  - name: bundled-fetch
    command: ["capdep", "mcp-server-fetch"]
    inherent_labels: ["untrusted.external"]
    tool_overrides:
      "fetch.get":
        capability_kind: WEB_FETCH

  - name: bundled-search
    command: ["capdep", "mcp-server-search"]
    inherent_labels: ["untrusted.external"]
    tool_overrides:
      "search.web":
        capability_kind: WEB_FETCH

  - name: bundled-memory
    command: ["capdep", "mcp-server-memory"]
    inherent_labels: []
    tool_overrides:
      "memory.create":
        capability_kind: CREATE_FS
      "memory.read":
        capability_kind: READ_FS
      "memory.update":
        capability_kind: WRITE_FS
      "memory.delete":
        capability_kind: DELETE_FS
      "memory.list":
        capability_kind: READ_FS

  - name: bundled-git
    command: ["capdep", "mcp-server-git"]
    inherent_labels: []
    tool_overrides:
      "git.status":
        capability_kind: READ_FS
      "git.log":
        capability_kind: READ_FS
      "git.diff":
        capability_kind: READ_FS
      "git.show":
        capability_kind: READ_FS
      "git.branch_list":
        capability_kind: READ_FS

  # ---------------- macOS / Apple apps ----------------
  # Bounded AppleScript-backed servers. They do not expose generic
  # AppleScript execution; each tool maps to a granular capability kind.

  - name: bundled-apple-mail
    command: ["capdep", "mcp-server-apple-mail"]
    inherent_labels: ["confidential.personal", "untrusted.user_input"]
    tool_overrides:
      "apple_mail.list_accounts":
        capability_kind: APPLE_MAIL_READ
      "apple_mail.list_mailboxes":
        capability_kind: APPLE_MAIL_READ
      "apple_mail.search_messages":
        capability_kind: APPLE_MAIL_READ
      "apple_mail.get_message":
        capability_kind: APPLE_MAIL_READ
      "apple_mail.create_draft":
        capability_kind: APPLE_MAIL_DRAFT

  - name: bundled-keynote
    command: ["capdep", "mcp-server-keynote"]
    inherent_labels: ["confidential.personal"]
    tool_overrides:
      "keynote.frontmost_document":
        capability_kind: KEYNOTE_READ
      "keynote.list_slides":
        capability_kind: KEYNOTE_READ
      "keynote.slide_text":
        capability_kind: KEYNOTE_READ
      "keynote.start_slideshow":
        capability_kind: KEYNOTE_PRESENT
      "keynote.stop_slideshow":
        capability_kind: KEYNOTE_PRESENT

  - name: bundled-pages
    command: ["capdep", "mcp-server-pages"]
    inherent_labels: ["confidential.personal"]
    tool_overrides:
      "pages.frontmost_document":
        capability_kind: PAGES_READ
      "pages.document_text":
        capability_kind: PAGES_READ
      "pages.append_text":
        capability_kind: PAGES_EDIT
      "pages.export_pdf":
        capability_kind: PAGES_EXPORT

  - name: bundled-numbers
    command: ["capdep", "mcp-server-numbers"]
    inherent_labels: ["confidential.personal"]
    tool_overrides:
      "numbers.frontmost_document":
        capability_kind: NUMBERS_READ
      "numbers.list_sheets":
        capability_kind: NUMBERS_READ
      "numbers.table_summary":
        capability_kind: NUMBERS_READ
      "numbers.get_cell_value":
        capability_kind: NUMBERS_READ
      "numbers.set_cell_value":
        capability_kind: NUMBERS_EDIT
      "numbers.export_pdf":
        capability_kind: NUMBERS_EXPORT

  - name: bundled-macos
    command: ["capdep", "mcp-server-macos"]
    inherent_labels: ["confidential.personal"]
    tool_overrides:
      "macos.frontmost_application":
        capability_kind: MACOS_APP_CONTROL
      "macos.list_running_applications":
        capability_kind: MACOS_APP_CONTROL
      "macos.open_application":
        capability_kind: MACOS_APP_CONTROL
      "macos.get_clipboard_text":
        capability_kind: MACOS_CLIPBOARD_READ
      "macos.set_clipboard_text":
        capability_kind: MACOS_CLIPBOARD_WRITE
      "macos.show_notification":
        capability_kind: MACOS_NOTIFICATION

  # ---------------- Google Workspace ----------------
  # Browser OAuth/PKCE bootstrap:
  #   export GOOGLE_MCP_CLIENT_ID=...
  #   export GOOGLE_MCP_CLIENT_SECRET=...
  #   capdep oauth login --config configs/personal-assistant/daemon.yaml --server google-gmail
  #   capdep oauth login --config configs/personal-assistant/daemon.yaml --server google-drive
  #   capdep oauth login --config configs/personal-assistant/daemon.yaml --server google-calendar
  #   capdep oauth login --config configs/personal-assistant/daemon.yaml --server google-chat
  #   capdep oauth login --config configs/personal-assistant/daemon.yaml --server google-people
  #
  # Direct outbound Gmail send stays disabled. The assistant can read
  # and draft; sending remains a deliberate operator-controlled step.

  - name: google-gmail
    transport: streamable_http
    url: "https://gmailmcp.googleapis.com/mcp/v1"
    auth:
      type: oauth2
      client_id_env: GOOGLE_MCP_CLIENT_ID
      client_secret_env: GOOGLE_MCP_CLIENT_SECRET
      authorization_url: "https://accounts.google.com/o/oauth2/v2/auth"
      token_url: "https://oauth2.googleapis.com/token"
      scopes:
        - "https://www.googleapis.com/auth/gmail.readonly"
        - "https://www.googleapis.com/auth/gmail.compose"
      extra_authorize_params:
        access_type: offline
        prompt: consent
    inherent_labels: ["confidential.personal", "untrusted.user_input"]
    disabled_kinds: ["SEND_EMAIL"]
    tool_overrides:
      create_draft: {capability_kind: GMAIL_DRAFT, additional_labels: ["confidential.personal"]}
      create_label: {capability_kind: MODIFY_FS, additional_labels: ["confidential.personal"]}
      get_thread: {capability_kind: GMAIL_READ, additional_labels: ["confidential.personal", "untrusted.user_input"]}
      label_message: {capability_kind: MODIFY_FS, additional_labels: ["confidential.personal"]}
      label_thread: {capability_kind: MODIFY_FS, additional_labels: ["confidential.personal"]}
      list_drafts: {capability_kind: GMAIL_READ, additional_labels: ["confidential.personal"]}
      list_labels: {capability_kind: GMAIL_READ, additional_labels: ["confidential.personal"]}
      search_threads: {capability_kind: GMAIL_READ, additional_labels: ["confidential.personal", "untrusted.user_input"]}
      unlabel_message: {capability_kind: MODIFY_FS, additional_labels: ["confidential.personal"]}
      unlabel_thread: {capability_kind: MODIFY_FS, additional_labels: ["confidential.personal"]}
    strict: true

  - name: google-drive
    transport: streamable_http
    url: "https://drivemcp.googleapis.com/mcp/v1"
    auth:
      type: oauth2
      client_id_env: GOOGLE_MCP_CLIENT_ID
      client_secret_env: GOOGLE_MCP_CLIENT_SECRET
      authorization_url: "https://accounts.google.com/o/oauth2/v2/auth"
      token_url: "https://oauth2.googleapis.com/token"
      scopes:
        - "https://www.googleapis.com/auth/drive.readonly"
        - "https://www.googleapis.com/auth/drive.file"
      extra_authorize_params:
        access_type: offline
        prompt: consent
    inherent_labels: ["confidential.personal", "untrusted.user_input"]
    tool_overrides:
      copy_file: {capability_kind: CREATE_FS, additional_labels: ["confidential.personal"]}
      create_file: {capability_kind: CREATE_FS, additional_labels: ["confidential.personal"]}
      download_file_content: {capability_kind: DRIVE_READ, additional_labels: ["confidential.personal", "untrusted.user_input"]}
      get_file_metadata: {capability_kind: DRIVE_READ, additional_labels: ["confidential.personal"]}
      get_file_permissions: {capability_kind: DRIVE_READ, additional_labels: ["confidential.personal"]}
      list_recent_files: {capability_kind: DRIVE_READ, additional_labels: ["confidential.personal"]}
      read_file_content: {capability_kind: DRIVE_READ, additional_labels: ["confidential.personal", "untrusted.user_input"]}
      search_files: {capability_kind: DRIVE_READ, additional_labels: ["confidential.personal", "untrusted.user_input"]}
    strict: true

  - name: google-calendar
    transport: streamable_http
    url: "https://calendarmcp.googleapis.com/mcp/v1"
    auth:
      type: oauth2
      client_id_env: GOOGLE_MCP_CLIENT_ID
      client_secret_env: GOOGLE_MCP_CLIENT_SECRET
      authorization_url: "https://accounts.google.com/o/oauth2/v2/auth"
      token_url: "https://oauth2.googleapis.com/token"
      scopes:
        - "https://www.googleapis.com/auth/calendar.calendarlist.readonly"
        - "https://www.googleapis.com/auth/calendar.events.freebusy"
        - "https://www.googleapis.com/auth/calendar.events.readonly"
      extra_authorize_params:
        access_type: offline
        prompt: consent
    inherent_labels: ["confidential.personal", "untrusted.user_input"]
    tool_overrides:
      create_event: {capability_kind: CREATE_CAL, additional_labels: ["confidential.personal"]}
      delete_event: {capability_kind: DELETE_CAL, additional_labels: ["confidential.personal"]}
      get_event: {capability_kind: CALENDAR_READ, additional_labels: ["confidential.personal", "untrusted.user_input"]}
      list_calendars: {capability_kind: CALENDAR_READ, additional_labels: ["confidential.personal"]}
      list_events: {capability_kind: CALENDAR_READ, additional_labels: ["confidential.personal", "untrusted.user_input"]}
      respond_to_event: {capability_kind: MODIFY_CAL, additional_labels: ["confidential.personal"]}
      suggest_time: {capability_kind: CALENDAR_READ, additional_labels: ["confidential.personal"]}
      update_event: {capability_kind: MODIFY_CAL, additional_labels: ["confidential.personal"]}
    strict: true

  - name: google-chat
    transport: streamable_http
    url: "https://chatmcp.googleapis.com/mcp/v1"
    auth:
      type: oauth2
      client_id_env: GOOGLE_MCP_CLIENT_ID
      client_secret_env: GOOGLE_MCP_CLIENT_SECRET
      authorization_url: "https://accounts.google.com/o/oauth2/v2/auth"
      token_url: "https://oauth2.googleapis.com/token"
      scopes:
        - "https://www.googleapis.com/auth/chat.spaces.readonly"
        - "https://www.googleapis.com/auth/chat.memberships.readonly"
        - "https://www.googleapis.com/auth/chat.messages.readonly"
        - "https://www.googleapis.com/auth/chat.messages.create"
        - "https://www.googleapis.com/auth/chat.users.readstate.readonly"
      extra_authorize_params:
        access_type: offline
        prompt: consent
    inherent_labels: ["confidential.personal", "untrusted.user_input"]
    tool_overrides:
      list_messages: {capability_kind: CHAT_READ, additional_labels: ["confidential.personal", "untrusted.user_input"]}
      search_conversations: {capability_kind: CHAT_READ, additional_labels: ["confidential.personal"]}
      search_messages: {capability_kind: CHAT_READ, additional_labels: ["confidential.personal", "untrusted.user_input"]}
      send_message: {capability_kind: SEND_MESSAGE, additional_labels: ["confidential.personal"]}
    strict: true

  - name: google-people
    transport: streamable_http
    url: "https://people.googleapis.com/mcp/v1"
    auth:
      type: oauth2
      client_id_env: GOOGLE_MCP_CLIENT_ID
      client_secret_env: GOOGLE_MCP_CLIENT_SECRET
      authorization_url: "https://accounts.google.com/o/oauth2/v2/auth"
      token_url: "https://oauth2.googleapis.com/token"
      scopes:
        - "https://www.googleapis.com/auth/directory.readonly"
        - "https://www.googleapis.com/auth/userinfo.profile"
        - "https://www.googleapis.com/auth/contacts.readonly"
      extra_authorize_params:
        access_type: offline
        prompt: consent
    inherent_labels: ["confidential.personal"]
    tool_overrides:
      get_user_profile: {capability_kind: PEOPLE_READ, additional_labels: ["confidential.personal"]}
      search_contacts: {capability_kind: PEOPLE_READ, additional_labels: ["confidential.personal"]}
      search_directory_people: {capability_kind: PEOPLE_READ, additional_labels: ["confidential.personal"]}
    strict: true
