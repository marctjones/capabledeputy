# Master daemon config for the personal-assistant preset.
# Wires up the 5 bundled MCP servers + Google Workspace + signals
# the daemon to read the other policy files from this same directory.
#
# Use:
#   capdep daemon start --config configs/personal-assistant/daemon.yaml
#
# The daemon's policy loader walks the parent directory of this file
# looking for: profiles.yaml, purposes.yaml, source_bindings.yaml,
# envelopes.yaml, override_policy.yaml, approval-patterns.yaml. Drop
# them next to this file to be picked up.

upstream_servers:
  # ---------------- bundled Python servers ----------------
  # No Node.js / npm required. Pure Python, ships with capdep.

  - name: bundled-fs
    command: ["capdep", "mcp-server-fs"]
    inherent_labels: []
    tool_overrides:
      "fs.read":
        capability_kind: READ_FS
      "fs.list":
        capability_kind: READ_FS
      "fs.create":
        capability_kind: CREATE_FS
      "fs.write":
        capability_kind: WRITE_FS
      "fs.delete":
        capability_kind: DELETE_FS

  - name: bundled-fetch
    command: ["capdep", "mcp-server-fetch"]
    inherent_labels: ["untrusted.external"]
    tool_overrides:
      "fetch.get":
        capability_kind: WEB_FETCH

  - name: bundled-search
    command: ["capdep", "mcp-server-search"]
    inherent_labels: ["untrusted.external"]
    tool_overrides:
      "search.web":
        capability_kind: WEB_FETCH

  - name: bundled-memory
    command: ["capdep", "mcp-server-memory"]
    inherent_labels: []
    tool_overrides:
      "memory.create":
        capability_kind: CREATE_FS
      "memory.read":
        capability_kind: READ_FS
      "memory.update":
        capability_kind: WRITE_FS
      "memory.delete":
        capability_kind: DELETE_FS
      "memory.list":
        capability_kind: READ_FS

  - name: bundled-git
    command: ["capdep", "mcp-server-git"]
    inherent_labels: []
    tool_overrides:
      "git.status":
        capability_kind: READ_FS
      "git.log":
        capability_kind: READ_FS
      "git.diff":
        capability_kind: READ_FS
      "git.show":
        capability_kind: READ_FS
      "git.branch_list":
        capability_kind: READ_FS

  # ---------------- Google Workspace ----------------
  # Wired to `gws-mcp-server` (community wrapper around the `gws`
  # Workspace CLI). Reuses OAuth tokens from `gws auth login` (cached
  # in the OS keyring); no separate auth flow.
  #
  # Operator setup (once):
  #   npm install -g @googleworkspace/cli        # installs `gws`
  #   gws auth setup                             # gcloud + OAuth client
  #   gws auth login -s drive,gmail,calendar,docs,sheets
  #   npm install -g gws-mcp-server              # this server
  #
  # Gmail in this server is read-only by design. See
  # docs/gworkspace-setup.md for the full walkthrough.
  # Comment this block out if you don't want Google integration.

  - name: gws
    command: ["npx", "gws-mcp-server", "--services", "drive,sheets,calendar,docs,gmail"]
    inherent_labels:
      - confidential.personal
    tool_overrides:
      "drive_delete_file":
        capability_kind: DELETE_FS
        additional_labels: ["confidential.personal"]
      "drive_update_file":
        capability_kind: MODIFY_FS
        additional_labels: ["confidential.personal"]
      "drive_create_file":
        capability_kind: CREATE_FS
      "drive_copy_file":
        capability_kind: CREATE_FS
      "drive_share_file":
        capability_kind: MODIFY_FS
        additional_labels: ["confidential.personal"]
      "calendar_delete_event":
        capability_kind: DELETE_CAL
        additional_labels: ["confidential.personal"]
      "calendar_update_event":
        capability_kind: MODIFY_CAL
        additional_labels: ["confidential.personal"]
      "calendar_insert_event":
        capability_kind: CREATE_CAL
      "sheets_write_values":
        capability_kind: MODIFY_FS
        additional_labels: ["confidential.personal"]
      "sheets_append_values":
        capability_kind: MODIFY_FS
        additional_labels: ["confidential.personal"]
      "docs_batch_update":
        capability_kind: MODIFY_FS
        additional_labels: ["confidential.personal"]
      "docs_create_document":
        capability_kind: CREATE_FS
    strict: false
