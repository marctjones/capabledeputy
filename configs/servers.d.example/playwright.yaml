# Playwright official MCP server config (servers.d layout).
#
# Copy to ~/.config/capabledeputy/servers.d/playwright.yaml.

schema_version: 1
name: playwright
transport: stdio
command: ["npx", "-y", "@playwright/mcp@latest"]

inherent_labels:
  - untrusted.external

strict: true

tool_mappings:
  browser_console_messages: WEB_FETCH
  browser_network_request: WEB_FETCH
  browser_network_requests: WEB_FETCH
  browser_snapshot: WEB_FETCH
  browser_take_screenshot: WEB_FETCH
  browser_click: BROWSER_AUTOMATION
  browser_close: BROWSER_AUTOMATION
  browser_drag: BROWSER_AUTOMATION
  browser_drop: BROWSER_AUTOMATION
  browser_evaluate: BROWSER_AUTOMATION
  browser_file_upload: BROWSER_AUTOMATION
  browser_fill_form: BROWSER_AUTOMATION
  browser_handle_dialog: BROWSER_AUTOMATION
  browser_hover: BROWSER_AUTOMATION
  browser_navigate: BROWSER_AUTOMATION
  browser_navigate_back: BROWSER_AUTOMATION
  browser_press_key: BROWSER_AUTOMATION
  browser_resize: BROWSER_AUTOMATION
  browser_select_option: BROWSER_AUTOMATION
  browser_tabs: BROWSER_AUTOMATION
  browser_type: BROWSER_AUTOMATION
  browser_wait_for: BROWSER_AUTOMATION
