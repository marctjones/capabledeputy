# Playwright official MCP server config (servers.d layout).
#
# Copy to ~/.config/capabledeputy/servers.d/playwright.yaml.

schema_version: 1
name: playwright
transport: stdio
command: ["npx", "-y", "@playwright/mcp@latest"]

inherent_labels:
  - untrusted.external

strict: true

tool_mappings:
  browser_console_messages: BROWSER_READ
  browser_network_request: BROWSER_READ
  browser_network_requests: BROWSER_READ
  browser_snapshot: BROWSER_READ
  browser_take_screenshot: BROWSER_READ
  browser_click: BROWSER_INTERACT
  browser_close: BROWSER_NAVIGATE
  browser_drag: BROWSER_INTERACT
  browser_drop: BROWSER_FILE
  browser_evaluate: BROWSER_SCRIPT
  browser_file_upload: BROWSER_FILE
  browser_fill_form: BROWSER_INTERACT
  browser_handle_dialog: BROWSER_INTERACT
  browser_hover: BROWSER_INTERACT
  browser_navigate: BROWSER_NAVIGATE
  browser_navigate_back: BROWSER_NAVIGATE
  browser_press_key: BROWSER_INTERACT
  browser_resize: BROWSER_NAVIGATE
  browser_select_option: BROWSER_INTERACT
  browser_tabs: BROWSER_NAVIGATE
  browser_type: BROWSER_INTERACT
  browser_wait_for: BROWSER_NAVIGATE
