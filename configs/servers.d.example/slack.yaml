# Slack official remote MCP server config (servers.d layout).
#
# Copy to ~/.config/capabledeputy/servers.d/slack.yaml, export:
#   export SLACK_MCP_CLIENT_ID=...
#   export SLACK_MCP_CLIENT_SECRET=...
# Then run:
#   capdep oauth login --server slack

schema_version: 1
name: slack
transport: streamable_http
url: https://mcp.slack.com/mcp
auth:
  type: oauth2
  client_id_env: SLACK_MCP_CLIENT_ID
  client_secret_env: SLACK_MCP_CLIENT_SECRET
  protected_resource_metadata_url: https://mcp.slack.com/.well-known/oauth-protected-resource
  authorization_metadata_url: https://mcp.slack.com/.well-known/oauth-authorization-server
  scopes:
    - search:read.public
    - search:read.private
    - search:read.mpim
    - search:read.im
    - search:read.files
    - search:read.users
    - files:read
    - emoji:read
    - chat:write
    - channels:history
    - groups:history
    - mpim:history
    - im:history
    - channels:write
    - groups:write
    - im:write
    - mpim:write
    - reactions:write
    - canvases:read
    - canvases:write
    - users:read
    - users:read.email
    - channels:read
    - groups:read
    - mpim:read

inherent_labels:
  - untrusted.external

strict: true

tool_mappings:
  search_messages: CHAT_READ
  read_file: CHAT_READ
  search_emoji: CHAT_READ
  search_users: CHAT_READ
  search_channels: CHAT_READ
  read_channel: CHAT_READ
  read_thread: CHAT_READ
  read_canvas: CHAT_READ
  read_user_profile: CHAT_READ
  list_channel_members: CHAT_READ
  send_message: SEND_MESSAGE
  draft_message: CREATE_FS
  create_conversation: SEND_MESSAGE
  add_reaction: SEND_MESSAGE
  create_canvas: SEND_MESSAGE
  update_canvas: SEND_MESSAGE
