# IMAP MCP server config (Issue #35 layout).
#
# To use: copy this file to `~/.config/capabledeputy/servers.d/imap.yaml`
# and restart the daemon.
#
# Prerequisites: `capdep imap-setup` (creates ~/.config/capabledeputy/secrets/imap-config.yaml).
# This is the bundled mcp-server-imap; no external npm dependency.

schema_version: 1
name: mail

transport: stdio
command: ["capdep", "mcp-server-imap"]

# Every email's content is tagged confidential.personal +
# untrusted.user_input — flows that read mail can't egress without
# operator review.
inherent_labels: []

strict: true

# OUTBOUND MAIL DISABLED (operator policy): refuse any tool that classifies
# as SEND_EMAIL (imap.send) — the agent cannot send mail. Reading/organizing
# stays enabled. Remove this line to allow sending.
disabled_kinds: ["SEND_EMAIL"]

tool_overrides:
  # Read tools — IMAP_READ kind. Default sessions auto-grant IMAP_READ *.
  # Per-tool labels color the session's IFC state after reading.
  imap.list_threads:
    capability_kind: IMAP_READ
    additional_labels: [confidential.personal, untrusted.user_input]
  imap.read_message:
    capability_kind: IMAP_READ
    additional_labels: [confidential.personal, untrusted.user_input]
  imap.search:
    capability_kind: IMAP_READ
    additional_labels: [confidential.personal, untrusted.user_input]
  imap.list_folders:
    capability_kind: IMAP_READ

  # Send mail — destructive egress. Requires /grant SEND_EMAIL ... --destructive.
  imap.send:
    capability_kind: SEND_EMAIL

  # Modifying tools — destructive operations on existing state.
  imap.mark_read:
    capability_kind: MODIFY_FS
  imap.archive:
    capability_kind: MODIFY_FS
