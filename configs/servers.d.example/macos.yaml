# General macOS bundled MCP server config (servers.d layout).
#
# Copy to ~/.config/capabledeputy/servers.d/macos.yaml.
# macOS will still enforce Automation/TCC prompts for the terminal process.

schema_version: 1
name: macos
transport: stdio
command: ["capdep", "mcp-server-macos"]

inherent_labels:
  - confidential.personal

strict: true

tool_mappings:
  macos.frontmost_application: MACOS_APP_CONTROL
  macos.list_running_applications: MACOS_APP_CONTROL
  macos.open_application: MACOS_APP_CONTROL
  macos.get_clipboard_text: MACOS_CLIPBOARD_READ
  macos.set_clipboard_text: MACOS_CLIPBOARD_WRITE
  macos.show_notification: MACOS_NOTIFICATION
