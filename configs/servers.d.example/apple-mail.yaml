# Apple Mail bundled MCP server config (servers.d layout).
#
# Copy to ~/.config/capabledeputy/servers.d/apple-mail.yaml.
# macOS will still enforce Automation/TCC prompts for the terminal process.

schema_version: 1
name: apple-mail
transport: stdio
command: ["capdep", "mcp-server-apple-mail"]

inherent_labels:
  - confidential.personal
  - untrusted.user_input

strict: true

tool_mappings:
  apple_mail.list_accounts: APPLE_MAIL_READ
  apple_mail.list_mailboxes: APPLE_MAIL_READ
  apple_mail.search_messages: APPLE_MAIL_READ
  apple_mail.get_message: APPLE_MAIL_READ
  apple_mail.create_draft: APPLE_MAIL_DRAFT
