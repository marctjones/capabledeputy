# Keynote bundled MCP server config (servers.d layout).
#
# Copy to ~/.config/capabledeputy/servers.d/keynote.yaml.
# macOS will still enforce Automation/TCC prompts for the terminal process.

schema_version: 1
name: keynote
transport: stdio
command: ["capdep", "mcp-server-keynote"]

inherent_labels:
  - confidential.personal

strict: true

tool_mappings:
  keynote.frontmost_document: KEYNOTE_READ
  keynote.list_slides: KEYNOTE_READ
  keynote.slide_text: KEYNOTE_READ
  keynote.start_slideshow: KEYNOTE_PRESENT
  keynote.stop_slideshow: KEYNOTE_PRESENT
