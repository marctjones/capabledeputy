# Curated upstream config — Slack official remote MCP server.
#
# Producer: Slack (official remote server).
# Transport: streamable HTTP. Authentication uses Slack's MCP OAuth
# metadata and user-token flow. Create an internal or Marketplace Slack
# app, export SLACK_MCP_CLIENT_ID / SLACK_MCP_CLIENT_SECRET, then run:
#   capdep oauth login --config configs/curated/slack.yaml --server slack
#
# Label rationale:
#   - Messages authored by OTHER people are untrusted.external (the
#     prompt-injection vector). Read tools therefore taint the session,
#     so the untrusted-meets-egress rule then blocks forwarding that
#     content outward without an explicit declassifier.
#   - Posting/sending is an egress action: mapped to SEND_EMAIL so the
#     same egress conflict rules (financial-meets-email, etc.) apply.
#     There is no Slack-specific capability kind by design — egress is
#     egress; the channel is irrelevant to the policy.
#
upstream_servers:
  - name: slack
    transport: streamable_http
    url: "https://mcp.slack.com/mcp"
    auth:
      type: oauth2
      client_id_env: SLACK_MCP_CLIENT_ID
      client_secret_env: SLACK_MCP_CLIENT_SECRET
      protected_resource_metadata_url: "https://mcp.slack.com/.well-known/oauth-protected-resource"
      authorization_metadata_url: "https://mcp.slack.com/.well-known/oauth-authorization-server"
      scopes:
        - search:read.public
        - search:read.private
        - search:read.mpim
        - search:read.im
        - search:read.files
        - search:read.users
        - files:read
        - emoji:read
        - chat:write
        - channels:history
        - groups:history
        - mpim:history
        - im:history
        - channels:write
        - groups:write
        - im:write
        - mpim:write
        - reactions:write
        - canvases:read
        - canvases:write
        - users:read
        - users:read.email
        - channels:read
        - groups:read
        - mpim:read
    strict: true
    inherent_labels:
      - untrusted.external
    tool_overrides:
      # Reads: classify as CHAT_READ; inherent untrusted.external above
      # taints the session with relayed third-party content.
      search_messages:      { capability_kind: CHAT_READ }
      read_file:            { capability_kind: CHAT_READ }
      search_emoji:         { capability_kind: CHAT_READ }
      search_users:         { capability_kind: CHAT_READ }
      search_channels:      { capability_kind: CHAT_READ }
      read_channel:         { capability_kind: CHAT_READ }
      read_thread:          { capability_kind: CHAT_READ }
      read_canvas:          { capability_kind: CHAT_READ }
      read_user_profile:    { capability_kind: CHAT_READ }
      list_channel_members: { capability_kind: CHAT_READ }
      # Egress: posting a message leaves the trust boundary.
      send_message:         { capability_kind: SEND_MESSAGE }
      draft_message:        { capability_kind: CREATE_FS }
      create_conversation:  { capability_kind: SEND_MESSAGE }
      add_reaction:         { capability_kind: SEND_MESSAGE }
      create_canvas:        { capability_kind: SEND_MESSAGE }
      update_canvas:        { capability_kind: SEND_MESSAGE }
