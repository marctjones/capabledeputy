# Google Workspace via the OFFICIAL Google CLI MCP server (`gws mcp`).
#
# Producer: GOOGLE (official). The Google Workspace CLI ships an
# MCP-over-stdio server that exposes Drive / Gmail / Calendar / Docs /
# Sheets via Discovery-API-derived tool names. Google maintains the
# code + handles OAuth via OS keyring (AES-256-GCM at rest); we just
# spawn the binary and proxy stdio.
#
# Operator setup (once, end-to-end):
#   npm install -g @googleworkspace/cli       # install
#   gws auth setup                            # one-time gcloud + OAuth client
#   gws auth login -s drive,gmail,calendar    # browser consent
#
# Then either:
#   capdep daemon start --config configs/curated/google-workspace.yaml
# or (recommended) `capdep gworkspace-setup` to wire the managed block
# into your user-local daemon config so plain `capdep chat` picks it up.
#
# Replaces both:
#   - the deprecated home-grown `capdep mcp-server-gworkspace`
#   - the prior community `uvx workspace-mcp` invocation

upstream_servers:
  - name: gws
    command: ["gws", "mcp", "-s", "drive,gmail,calendar,docs,sheets"]
    inherent_labels:
      - confidential.personal
    tool_overrides:
      # Tool names follow Google Discovery API method paths
      # (e.g. `gmail.users.messages.send`). The adapter's name-based
      # inference handles the obvious `send`/`delete`/`update`/`create`
      # patterns; pin the highest-risk ones explicitly here so nothing
      # depends on inference for outbound or destructive calls.
      "gmail.users.messages.send":
        capability_kind: SEND_EMAIL
      "calendar.events.delete":
        capability_kind: DELETE_CAL
        additional_labels: ["confidential.personal"]
      "calendar.events.update":
        capability_kind: MODIFY_CAL
        additional_labels: ["confidential.personal"]
      "drive.files.delete":
        capability_kind: DELETE_FS
        additional_labels: ["confidential.personal"]
      "drive.files.update":
        capability_kind: MODIFY_FS
        additional_labels: ["confidential.personal"]
    # Strict mode: tools without an explicit override OR a confident
    # name-based inference are REFUSED at registration. The adapter
    # logs each rejected tool to stderr — copy the ones you actually
    # need into the overrides above. This is the safe posture for a
    # curated config; the user-managed block written by
    # `capdep gworkspace-setup` is more permissive (strict: false) for
    # personal exploration.
    strict: true
