# Official Google Workspace remote MCP servers.
#
# Producer: Google Workspace remote MCP servers.
# Transport: streamable HTTP with OAuth bearer tokens from Google
# Application Default Credentials.
#
# Prerequisites:
#   gcloud services enable gmailmcp.googleapis.com drivemcp.googleapis.com \
#     calendarmcp.googleapis.com chatmcp.googleapis.com people.googleapis.com
#   gcloud auth application-default login --scopes <Workspace scopes>
#
# Or run:
#   capdep gworkspace-setup
#
# CapDep pins every exposed tool to an explicit capability kind and runs
# strict admission. Unknown tools are refused until this mapping is reviewed.

upstream_servers:
  - name: google-gmail
    transport: streamable_http
    url: "https://gmailmcp.googleapis.com/mcp/v1"
    auth:
      type: google_adc
      scopes:
        - "https://www.googleapis.com/auth/gmail.readonly"
        - "https://www.googleapis.com/auth/gmail.compose"
    inherent_labels: ["confidential.personal", "untrusted.user_input"]
    disabled_kinds: ["SEND_EMAIL"]
    tool_overrides:
      create_draft: {capability_kind: CREATE_FS, additional_labels: ["confidential.personal"]}
      create_label: {capability_kind: MODIFY_FS, additional_labels: ["confidential.personal"]}
      get_thread: {capability_kind: GMAIL_READ, additional_labels: ["confidential.personal", "untrusted.user_input"]}
      label_message: {capability_kind: MODIFY_FS, additional_labels: ["confidential.personal"]}
      label_thread: {capability_kind: MODIFY_FS, additional_labels: ["confidential.personal"]}
      list_drafts: {capability_kind: GMAIL_READ, additional_labels: ["confidential.personal"]}
      list_labels: {capability_kind: GMAIL_READ, additional_labels: ["confidential.personal"]}
      search_threads: {capability_kind: GMAIL_READ, additional_labels: ["confidential.personal", "untrusted.user_input"]}
      unlabel_message: {capability_kind: MODIFY_FS, additional_labels: ["confidential.personal"]}
      unlabel_thread: {capability_kind: MODIFY_FS, additional_labels: ["confidential.personal"]}
    strict: true

  - name: google-drive
    transport: streamable_http
    url: "https://drivemcp.googleapis.com/mcp/v1"
    auth:
      type: google_adc
      scopes:
        - "https://www.googleapis.com/auth/drive.readonly"
        - "https://www.googleapis.com/auth/drive.file"
    inherent_labels: ["confidential.personal", "untrusted.user_input"]
    tool_overrides:
      copy_file: {capability_kind: CREATE_FS, additional_labels: ["confidential.personal"]}
      create_file: {capability_kind: CREATE_FS, additional_labels: ["confidential.personal"]}
      download_file_content: {capability_kind: DRIVE_READ, additional_labels: ["confidential.personal", "untrusted.user_input"]}
      get_file_metadata: {capability_kind: DRIVE_READ, additional_labels: ["confidential.personal"]}
      get_file_permissions: {capability_kind: DRIVE_READ, additional_labels: ["confidential.personal"]}
      list_recent_files: {capability_kind: DRIVE_READ, additional_labels: ["confidential.personal"]}
      read_file_content: {capability_kind: DRIVE_READ, additional_labels: ["confidential.personal", "untrusted.user_input"]}
      search_files: {capability_kind: DRIVE_READ, additional_labels: ["confidential.personal", "untrusted.user_input"]}
    strict: true

  - name: google-calendar
    transport: streamable_http
    url: "https://calendarmcp.googleapis.com/mcp/v1"
    auth:
      type: google_adc
      scopes:
        - "https://www.googleapis.com/auth/calendar.calendarlist.readonly"
        - "https://www.googleapis.com/auth/calendar.events.freebusy"
        - "https://www.googleapis.com/auth/calendar.events.readonly"
    inherent_labels: ["confidential.personal", "untrusted.user_input"]
    tool_overrides:
      create_event: {capability_kind: CREATE_CAL, additional_labels: ["confidential.personal"]}
      delete_event: {capability_kind: DELETE_CAL, additional_labels: ["confidential.personal"]}
      get_event: {capability_kind: CALENDAR_READ, additional_labels: ["confidential.personal", "untrusted.user_input"]}
      list_calendars: {capability_kind: CALENDAR_READ, additional_labels: ["confidential.personal"]}
      list_events: {capability_kind: CALENDAR_READ, additional_labels: ["confidential.personal", "untrusted.user_input"]}
      respond_to_event: {capability_kind: MODIFY_CAL, additional_labels: ["confidential.personal"]}
      suggest_time: {capability_kind: CALENDAR_READ, additional_labels: ["confidential.personal"]}
      update_event: {capability_kind: MODIFY_CAL, additional_labels: ["confidential.personal"]}
    strict: true

  - name: google-chat
    transport: streamable_http
    url: "https://chatmcp.googleapis.com/mcp/v1"
    auth:
      type: google_adc
      scopes:
        - "https://www.googleapis.com/auth/chat.spaces.readonly"
        - "https://www.googleapis.com/auth/chat.memberships.readonly"
        - "https://www.googleapis.com/auth/chat.messages.readonly"
        - "https://www.googleapis.com/auth/chat.messages.create"
        - "https://www.googleapis.com/auth/chat.users.readstate.readonly"
    inherent_labels: ["confidential.personal", "untrusted.user_input"]
    tool_overrides:
      list_messages: {capability_kind: CHAT_READ, additional_labels: ["confidential.personal", "untrusted.user_input"]}
      search_conversations: {capability_kind: CHAT_READ, additional_labels: ["confidential.personal"]}
      search_messages: {capability_kind: CHAT_READ, additional_labels: ["confidential.personal", "untrusted.user_input"]}
      send_message: {capability_kind: SEND_MESSAGE, additional_labels: ["confidential.personal"]}
    strict: true

  - name: google-people
    transport: streamable_http
    url: "https://people.googleapis.com/mcp/v1"
    auth:
      type: google_adc
      scopes:
        - "https://www.googleapis.com/auth/directory.readonly"
        - "https://www.googleapis.com/auth/userinfo.profile"
        - "https://www.googleapis.com/auth/contacts.readonly"
    inherent_labels: ["confidential.personal"]
    tool_overrides:
      get_user_profile: {capability_kind: PEOPLE_READ, additional_labels: ["confidential.personal"]}
      search_contacts: {capability_kind: PEOPLE_READ, additional_labels: ["confidential.personal"]}
      search_directory_people: {capability_kind: PEOPLE_READ, additional_labels: ["confidential.personal"]}
    strict: true
