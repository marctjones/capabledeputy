# CapableDeputy daemon config: load the bundled Python MCP servers.
#
# These are minimal-install — pure Python, no Node.js / npm required.
# Each is launched as a stdio MCP subprocess; the daemon wires their
# tools into the policy chokepoint just like any external MCP server.
#
# Load via: capdep daemon start --config configs/curated/bundled-python-servers.yaml
#
# Tool names will be prefixed with the server `name` below — so
# `fs.read` from the bundled-fs server becomes `bundled-fs.fs.read` in
# the agent's tool list. Bindings should target the prefixed names.

upstream_servers:
  - name: bundled-fs
    command: ["capdep", "mcp-server-fs"]
    # fs.read returns local file content; treat as confidential unless
    # binding patterns relax it.
    inherent_labels: []
    tool_overrides:
      "fs.read":
        capability_kind: READ_FS
      "fs.list":
        capability_kind: READ_FS
      "fs.create":
        capability_kind: CREATE_FS
      "fs.write":
        capability_kind: WRITE_FS
      "fs.delete":
        capability_kind: DELETE_FS

  - name: bundled-fetch
    command: ["capdep", "mcp-server-fetch"]
    # Everything fetched from the open web is untrusted external.
    inherent_labels: ["untrusted.external"]
    tool_overrides:
      "fetch.get":
        capability_kind: WEB_FETCH
      "wikipedia.lookup":
        capability_kind: WEB_FETCH
        target_template: "wikipedia://{title}"

  - name: bundled-search
    command: ["capdep", "mcp-server-search"]
    # Search results are also untrusted external content.
    inherent_labels: ["untrusted.external"]
    # Brave Search API key is read from the daemon env at subprocess
    # spawn time. Without it, DuckDuckGo Instant Answer is used (no key,
    # factoid queries only). For news/headlines, wire kagi.yaml and set
    # KAGI_API_KEY. Override per-server via an `env:` block if needed.
    tool_overrides:
      "search.web":
        capability_kind: WEB_FETCH
        target_arg: query

  - name: bundled-memory
    command: ["capdep", "mcp-server-memory"]
    # Memory entries inherit no labels; the operator's bindings
    # decide whether a particular key prefix is sensitive.
    inherent_labels: []
    tool_overrides:
      "memory.create":
        capability_kind: CREATE_FS
      "memory.read":
        capability_kind: READ_FS
      "memory.update":
        capability_kind: WRITE_FS
      "memory.delete":
        capability_kind: DELETE_FS
      "memory.list":
        capability_kind: READ_FS

  - name: bundled-git
    command: ["capdep", "mcp-server-git"]
    # Source code is sensitive by default; operator can relax via
    # bindings (e.g. public OSS repo → public tier).
    inherent_labels: []
    tool_overrides:
      "git.status":
        capability_kind: READ_FS
      "git.log":
        capability_kind: READ_FS
      "git.diff":
        capability_kind: READ_FS
      "git.show":
        capability_kind: READ_FS
      "git.branch_list":
        capability_kind: READ_FS

  - name: bundled-imap
    command: ["capdep", "mcp-server-imap"]
    inherent_labels: []
    disabled_kinds: ["SEND_EMAIL"]
    tool_overrides:
      "imap.list_threads":
        capability_kind: IMAP_READ
        additional_labels: ["confidential.personal", "untrusted.user_input"]
      "imap.read_message":
        capability_kind: IMAP_READ
        additional_labels: ["confidential.personal", "untrusted.user_input"]
      "imap.search":
        capability_kind: IMAP_READ
        additional_labels: ["confidential.personal", "untrusted.user_input"]
      "imap.list_folders":
        capability_kind: IMAP_READ
      "imap.send":
        capability_kind: SEND_EMAIL
      "imap.mark_read":
        capability_kind: MODIFY_FS
      "imap.archive":
        capability_kind: MODIFY_FS

  - name: bundled-applescript
    command: ["capdep", "mcp-server-applescript"]
    env:
      CAPDEP_APPLESCRIPT_CATALOGS: "${CAPDEP_APPLESCRIPT_CATALOGS:-configs/applescript/apple-mail-readonly.yaml:configs/applescript/keynote-readonly.yaml}"
    inherent_labels: ["confidential.personal"]
    tool_overrides:
      "mail.list_accounts":
        capability_kind: APPLE_MAIL_READ
      "mail.count_unread_inbox":
        capability_kind: APPLE_MAIL_READ
      "keynote.frontmost_document":
        capability_kind: KEYNOTE_READ

  - name: bundled-apple-mail
    command: ["capdep", "mcp-server-apple-mail"]
    inherent_labels: ["confidential.personal", "untrusted.user_input"]
    tool_overrides:
      "apple_mail.list_accounts":
        capability_kind: APPLE_MAIL_READ
        target_template: "applemail://accounts"
      "apple_mail.list_mailboxes":
        capability_kind: APPLE_MAIL_READ
        target_template: "applemail://mailboxes"
      "apple_mail.search_messages":
        capability_kind: APPLE_MAIL_READ
        target_template: "applemail://mailbox/{mailbox_name}"
      "apple_mail.get_message":
        capability_kind: APPLE_MAIL_READ
        target_template: "applemail://mailbox/{mailbox_name}/message/{message_id}"
      "apple_mail.create_draft":
        capability_kind: APPLE_MAIL_DRAFT
        target_arg: to

  - name: bundled-keynote
    command: ["capdep", "mcp-server-keynote"]
    inherent_labels: ["confidential.personal"]
    tool_overrides:
      "keynote.frontmost_document":
        capability_kind: KEYNOTE_READ
        target_template: "keynote://frontmost"
      "keynote.list_slides":
        capability_kind: KEYNOTE_READ
        target_template: "keynote://frontmost"
      "keynote.slide_text":
        capability_kind: KEYNOTE_READ
        target_template: "keynote://frontmost"
      "keynote.start_slideshow":
        capability_kind: KEYNOTE_PRESENT
        target_template: "keynote://frontmost"
      "keynote.stop_slideshow":
        capability_kind: KEYNOTE_PRESENT
        target_template: "keynote://frontmost"

  - name: bundled-pages
    command: ["capdep", "mcp-server-pages"]
    inherent_labels: ["confidential.personal"]
    tool_overrides:
      "pages.frontmost_document":
        capability_kind: PAGES_READ
        target_template: "pages://frontmost"
      "pages.document_text":
        capability_kind: PAGES_READ
        target_template: "pages://frontmost"
      "pages.append_text":
        capability_kind: PAGES_EDIT
        target_template: "pages://frontmost"
      "pages.export_pdf":
        capability_kind: PAGES_EXPORT
        target_arg: path

  - name: bundled-numbers
    command: ["capdep", "mcp-server-numbers"]
    inherent_labels: ["confidential.personal"]
    tool_overrides:
      "numbers.frontmost_document":
        capability_kind: NUMBERS_READ
        target_template: "numbers://frontmost"
      "numbers.list_sheets":
        capability_kind: NUMBERS_READ
        target_template: "numbers://frontmost"
      "numbers.table_summary":
        capability_kind: NUMBERS_READ
        target_template: "numbers://frontmost"
      "numbers.get_cell_value":
        capability_kind: NUMBERS_READ
        target_template: "numbers://frontmost"
      "numbers.set_cell_value":
        capability_kind: NUMBERS_EDIT
        target_template: "numbers://frontmost"
      "numbers.export_pdf":
        capability_kind: NUMBERS_EXPORT
        target_arg: path

  - name: bundled-macos
    command: ["capdep", "mcp-server-macos"]
    inherent_labels: ["confidential.personal"]
    tool_overrides:
      "macos.frontmost_application":
        capability_kind: MACOS_APP_CONTROL
        target_template: "macos://apps"
      "macos.list_running_applications":
        capability_kind: MACOS_APP_CONTROL
        target_template: "macos://apps"
      "macos.open_application":
        capability_kind: MACOS_APP_CONTROL
        target_template: "macos://app/{bundle_id}"
      "macos.get_clipboard_text":
        capability_kind: MACOS_CLIPBOARD_READ
        target_template: "macos://clipboard"
      "macos.set_clipboard_text":
        capability_kind: MACOS_CLIPBOARD_WRITE
        target_template: "macos://clipboard"
      "macos.show_notification":
        capability_kind: MACOS_NOTIFICATION
        target_template: "macos://notification"

  - name: bundled-outlook
    command: ["capdep", "mcp-server-outlook"]
    inherent_labels: ["confidential.personal", "untrusted.user_input"]
    tool_overrides:
      "outlook.list_accounts":
        capability_kind: OUTLOOK_READ
        target_template: "outlook://accounts"
      "outlook.create_draft":
        capability_kind: OUTLOOK_DRAFT
        target_arg: to

  - name: bundled-word
    command: ["capdep", "mcp-server-word"]
    inherent_labels: ["confidential.personal"]
    tool_overrides:
      "word.frontmost_document":
        capability_kind: WORD_READ
        target_template: "word://frontmost"
      "word.document_text":
        capability_kind: WORD_READ
        target_template: "word://frontmost"
      "word.append_text":
        capability_kind: WORD_EDIT
        target_template: "word://frontmost"
      "word.export_pdf":
        capability_kind: WORD_EXPORT
        target_arg: path

  - name: bundled-powerpoint
    command: ["capdep", "mcp-server-powerpoint"]
    inherent_labels: ["confidential.personal"]
    tool_overrides:
      "powerpoint.frontmost_presentation":
        capability_kind: POWERPOINT_READ
        target_template: "powerpoint://frontmost"
      "powerpoint.list_slides":
        capability_kind: POWERPOINT_READ
        target_template: "powerpoint://frontmost"
      "powerpoint.append_speaker_notes":
        capability_kind: POWERPOINT_EDIT
        target_template: "powerpoint://frontmost"
      "powerpoint.start_slideshow":
        capability_kind: POWERPOINT_PRESENT
        target_template: "powerpoint://frontmost"
      "powerpoint.export_pdf":
        capability_kind: POWERPOINT_EXPORT
        target_arg: path

  - name: bundled-image-fetch
    # Lightweight HTTP fetch; runs in main CapDep venv (no torch).
    command: ["capdep", "mcp-server-image-fetch"]
    inherent_labels: ["untrusted.external"]
    env:
      CAPDEP_IMAGE_OUTPUT_DIR: "~/.capdep/work/images"
    tool_overrides:
      "image.fetch":
        capability_kind: FETCH_IMAGE
        target_arg: url

  - name: bundled-image-generate
    # Prefer repo .venv-images (scripts/setup-images-venv.sh) or set
    # CAPDEP_IMAGE_PYTHON in env. On Apple Silicon, auto requires
    # MFLUX with MLX/Metal and fails closed instead of falling back to
    # CPU/Torch/Diffusers.
    command: ["capdep-image-generate", "mcp-server-image-generate"]
    inherent_labels: []
    env:
      CAPDEP_IMAGE_PROFILE: "default"
      CAPDEP_IMAGE_BACKEND: "auto"
      CAPDEP_IMAGE_MODEL: "z-image-turbo"
      CAPDEP_IMAGE_MODEL_PATH: "filipstrand/Z-Image-Turbo-mflux-4bit"
      CAPDEP_IMAGE_QUANTIZE: "8"
      CAPDEP_IMAGE_PROMPT_FILTER: "off"
      CAPDEP_IMAGE_SAFETY: "off"
      CAPDEP_IMAGE_STYLE: "photoreal"
      CAPDEP_IMAGE_DEVICE: "auto"
      CAPDEP_IMAGE_WIDTH: "768"
      CAPDEP_IMAGE_HEIGHT: "768"
      CAPDEP_IMAGE_STEPS: "9"
      # Profiles:
      #   default    = fast MFLUX/MLX Z-Image-Turbo when available
      #   quality-flux2 = MFLUX FLUX.2 Klein benchmark challenger
      #   quality-qwen  = MFLUX Qwen Image benchmark challenger
      #   flux-nsfw  = MFLUX FLUX.1 LoRA profile; set CAPDEP_IMAGE_LORAS
      #   flux2-nsfw = MFLUX FLUX.2 Klein 9B LoRA profile; slower but targeted
      #   sdxl-nsfw  = Diffusers SDXL fallback; set photoreal checkpoint below
      #   pony-nsfw  = Diffusers Pony/Illustrious fallback; set graphic_novel checkpoint below
      # Override checkpoints after prefetching weights into $AI_MODELS_DIR or HF cache:
      # CAPDEP_IMAGE_CHECKPOINT_PATH: "/path/to/photoreal-or-sdxl.safetensors"
      # CAPDEP_IMAGE_CHECKPOINT: "RunDiffusion/Juggernaut-XL-v9"
      # CAPDEP_IMAGE_CHECKPOINT_FILE: "Juggernaut-XL_v9_RunDiffusionPhoto_v2.safetensors"
      # CAPDEP_IMAGE_GRAPHIC_NOVEL_CHECKPOINT_PATH: "/path/to/pony-or-illustrious.safetensors"
      # CAPDEP_IMAGE_GRAPHIC_NOVEL_CHECKPOINT: "LyliaEngine/Pony_Diffusion_V6_XL"
      # CAPDEP_IMAGE_GRAPHIC_NOVEL_CHECKPOINT_FILE: "ponyDiffusionV6XL_v6StartWithThisOne.safetensors"
    tool_overrides:
      "image.generate":
        capability_kind: GENERATE_IMAGE
        target_template: "*"
