# Multi-credential MCP server pattern: two slots of the SAME upstream
# server, with distinct credentials, exposed as distinct tools to the
# agent.
#
# This is the canonical use case for per-server `env` with ${VAR}
# expansion. The two slots end up registered as:
#
#   github-work.list_issues, github-work.create_issue, ...
#   github-personal.list_issues, github-personal.create_issue, ...
#
# The LLM sees them as distinct tools, the bindings can label
# `github://octocorp/**` as work/sensitive and `github://marc/**` as
# personal/sensitive, and the chokepoint applies labels accordingly.
#
# Operator exports their credentials in their shell:
#   export WORK_GITHUB_TOKEN=gho_xxxx
#   export PERSONAL_GITHUB_TOKEN=ghp_yyyy
# Then:
#   capdep daemon start --config configs/curated/multi-credential-github.yaml

upstream_servers:
  - name: github-work
    command: ["mcp-server-github"]
    env:
      GITHUB_TOKEN: "${WORK_GITHUB_TOKEN}"
    # Refuse to register tools that don't match a known capability
    # kind. Set to false only if you trust the upstream server's
    # default classification heuristics.
    strict: true

  - name: github-personal
    command: ["mcp-server-github"]
    env:
      GITHUB_TOKEN: "${PERSONAL_GITHUB_TOKEN}"
    strict: true

# Companion bindings file (e.g. configs/bindings/github.yaml) can label
# the two namespaces distinctly:
#
#   bindings:
#     - name: github-work-repos
#       scope_pattern_canonical: "github://octocorp/**"
#       category: work
#       default_tier: sensitive
#     - name: github-personal-repos
#       scope_pattern_canonical: "github://marc/**"
#       category: personal
#       default_tier: sensitive
