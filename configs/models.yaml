# Operator-owned MLX model roles and deterministic routing (v0.35+).
# Load with CAPDEP_CONFIGS_DIR or the repo configs/ directory.
#
# HF weights: prefetch with `ai-fetch <org/model>` into $AI_MODELS_DIR.

default_backend: mlx

# Conversational chat turns cap completion at CHAT_MAX_TOKENS (512) in
# capabledeputy.agent.chat_turn — independent of role max_tokens below.
roles:
  # 8B follows tool/image instructions better than 4B; still fast on Apple Silicon.
  planner.fast:
    mlx: mlx-community/Qwen3-8B-4bit
    max_tokens: 2048

  # Tool-heavy and image-generation turns (see loop.py image_intent override).
  planner.tools:
    mlx: mlx-community/Qwen3-14B-4bit
    max_tokens: 4096

  # Manual quality mode for slower, more deliberate chat/research turns.
  # Keep this opt-in until it is benchmarked on the operator's specific Mac.
  planner.quality:
    mlx: mlx-community/Qwen3.6-35B-A3B-4bit
    max_tokens: 4096

  extractor:
    mlx: mlx-community/Phi-3.5-mini-instruct-4bit
    max_tokens: 1024

routing:
  - when:
      purpose_handle: [research, writing]
      user_message_chars_gte: 900
    role: planner.quality
    reason: long_quality_purpose

  - when:
      purpose_handle: [research, writing]
    role: planner.tools
    reason: purpose_handle_tier

  - when:
      execution_mode: PROGRAMMATIC
    role: planner.tools
    reason: programmatic_mode

  - when:
      n_visible_tools_gte: 10
    role: planner.tools
    reason: large_tool_surface

  - when:
      n_selected_tools_gte: 4
    role: planner.tools
    reason: multi_tool_turn

  - default:
      role: planner.fast
      reason: default_fast

tool_selection:
  mode: retrieve
  retrieval_top_k: 20
  ai_top_k: 12
  ai_gate_visible_gte: 15
  max_selected: 15
